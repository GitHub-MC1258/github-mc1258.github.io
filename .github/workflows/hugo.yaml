name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Cache Hugo resources
        uses: actions/cache@v4
        with:
          path: /tmp/hugo_cache
          # On utilise config.toml comme clé de hash car c'est lui qui définit les ressources
          key: ${{ runner.os }}-hugo-${{ hashFiles('**/config.toml') }}
          restore-keys: |
            ${{ runner.os }}-hugo-

      - name: Build
        # On utilise une seule commande Build avec le répertoire de cache
        run: hugo --minify --cacheDir /tmp/hugo_cache

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

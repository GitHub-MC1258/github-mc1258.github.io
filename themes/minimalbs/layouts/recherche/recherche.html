{{ define "main" }}
<div class="container my-5" style="max-width: 800px; margin: 0 auto; padding: 0 15px;">
    <h1 class="navbar-brand" style="font-size: 2.5rem; margin-bottom: 2rem; display: block;">{{ .Title }}</h1>

    <div class="search-wrapper-page mb-5">
        <input type="text"
               id="search-input-page"
               placeholder="Que recherchez-vous ?"
               class="form-control"
               autocomplete="off"
               autofocus>
        <button id="clear-search" class="btn-clear" title="Effacer la recherche" style="display: none;">&times;</button>
    </div>

    <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 2rem 0;">

    <div id="search-results" class="search-results-page-list">
        </div>
</div>

<style>
    /* ==========================================================================
       1. CHAMP DE SAISIE (STYLE FORMULAIRE CONTACT)
       ========================================================================== */
    #search-input-page {
        width: 100%;
        height: 55px;
        padding: 1rem 3rem 1rem 1rem; /* Padding large à droite pour la croix */
        border: 1px solid #ddd;
        border-radius: var(--btn-radius);
        font-size: 1.2rem;
        outline: none;
        transition: var(--transition);
        background-color: #ffffff;
    }

    #search-input-page:focus {
        outline: none !important;
        box-shadow: none !important; /* Supprime le halo bleu de Bootstrap */
        border-color: #ddd !important;
        border-left: 4px solid var(--signature-violet) !important;
        border-bottom: 4px solid var(--signature-violet) !important;
        padding-left: 1.2rem; /* Petit effet de décalage élégant au clic */
    }

    .search-wrapper-page {
        position: relative;
        display: flex;
        align-items: center;
        width: 100%;
    }

    /* Bouton d'effacement (Croix) */
    .btn-clear {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        font-size: 1.8rem;
        color: var(--primary-gray);
        cursor: pointer;
        line-height: 1;
        padding: 0;
        transition: var(--transition);
        z-index: 5;
    }

    .btn-clear:hover {
        color: var(--signature-violet);
        transform: translateY(-50%) scale(1.2);
    }

    /* ==========================================================================
       2. AFFICHAGE DES RÉSULTATS
       ========================================================================== */
    .search-results-page-list#search-results {
        position: static !important; /* Annule le mode menu déroulant du header */
        display: block !important;
        box-shadow: none !important;
        border: none !important;
        max-height: none !important;
        overflow: visible !important;
        padding: 0 !important;
        margin-top: 2rem !important;
        background: transparent !important;
    }

    .search-result-big {
        margin-bottom: 3rem;
        padding-bottom: 1.5rem;
        border-bottom: 1px solid var(--border-color);
        animation: fadeIn 0.4s ease-out forwards;
    }

    .search-result-big h3 {
        margin-bottom: 0.5rem;
    }

    .search-result-big .author {
        font-size: 0.85rem;
        color: var(--primary-gray);
        margin-bottom: 10px;
    }

    .search-result-big .excerpt {
        color: #444;
        line-height: 1.7;
        font-size: 1rem;
    }

    /* Surlignage des mots trouvés */
    mark {
        background-color: var(--signature-violet);
        color: white;
        padding: 0 4px;
        border-radius: 3px;
        font-weight: 500;
    }

    /* Animation d'apparition */
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive mobile */
    @media (max-width: 600px) {
        #search-input-page {
            font-size: 1rem;
            height: 50px;
        }
    }
</style>

<script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
<script src="/js/search.js"></script>

{{ end }}

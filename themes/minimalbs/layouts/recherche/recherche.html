{{ define "main" }}
<div class="container my-5" style="max-width: 800px; margin: 0 auto; padding: 0 15px;">
    <h1 class="navbar-brand" style="font-size: 2.5rem; margin-bottom: 2rem; display: block;">{{ .Title }}</h1>

    <div class="search-wrapper-page mb-5">
        <input type="text"
               id="search-input-page"
               placeholder="Que recherchez-vous ?"
               class="form-control"
               autocomplete="off"
               autofocus>
        <button id="clear-search" class="btn-clear" title="Effacer la recherche" style="display: none;">&times;</button>
    </div>

    <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 2rem 0;">

    <div id="search-results" class="search-results-page-list"></div>
</div>

<style>
    /* 1. CHAMP DE SAISIE : On utilise tes variables du main.css */
    #search-input-page {
        width: 100%;
        height: 55px;
        padding: 1rem 3rem 1rem 1rem;
        border: 1px solid #ddd;
        border-radius: var(--btn-radius);
        font-size: 1.2rem;
        outline: none;
        transition: var(--transition);
        background-color: #ffffff;
    }

    /* Effet Focus identique à ton formulaire de contact */
    #search-input-page:focus {
        outline: none !important;
        box-shadow: none !important;
        border-color: #ddd !important;
        border-left: 4px solid var(--signature-violet) !important;
        border-bottom: 4px solid var(--signature-violet) !important;
        padding-left: 1.2rem;
    }

    .search-wrapper-page {
        position: relative;
        display: flex;
        align-items: center;
        width: 100%;
    }

    .btn-clear {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        font-size: 1.8rem;
        color: var(--primary-gray);
        cursor: pointer;
        transition: var(--transition);
        z-index: 5;
    }

    /* 2. AFFICHAGE DES RÉSULTATS (Correction de la superposition) */
.search-results-page-list#search-results {
    position: relative !important; /* On annule l'absolute du main.css */
    display: block !important;
    visibility: visible !important;
    opacity: 1 !important;
    box-shadow: none !important;
    border: none !important;
    background: transparent !important;
    max-height: none !important; /* On autorise une hauteur illimitée */
    overflow: visible !important;
    margin-top: 2rem !important;
    z-index: 1 !important;
    width: 100% !important;
}

/* On s'assure que chaque article prend bien sa place */
.search-result-big {
    display: block !important;
    clear: both;
    margin-bottom: 3rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border-color);
    animation: fadeIn 0.4s ease-out forwards;
}

    /* Meta info : Date et Auteur */
    .search-result-big .meta-info {
        font-size: 0.85rem;
        color: var(--primary-gray);
        margin-bottom: 10px;
        font-style: normal; /* On force le style normal ici */
    }

    .search-result-big .date {
        font-weight: 400;
        color: var(--primary-gray);
        text-transform: none; /* Aligné sur ton style 'time' du main.css */
    }

    .search-result-big .author {
        font-weight: 600;
        font-style: normal; /* Supprime l'italique hérité du thème */
    }

    .search-result-big .excerpt {
        color: #444;
        line-height: 1.7;
        font-size: 1rem;
    }

    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(15px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
        #search-input-page { font-size: 1rem; height: 50px; }
    }
</style>

<script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
<script src="/js/search.js"></script>
{{ end }}

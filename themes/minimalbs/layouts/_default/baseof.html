<!DOCTYPE html>
<html lang="fr">
<head>
    {{- partial "head.html" . -}}
</head>
<body class="container py-4">
    {{- partial "header.html" . -}}

    <main>
        {{- block "main" . }}{{ end -}}
    </main>

    {{- partialCached "footer.html" . -}}

    {{ if ne .Type "contact" }}
        {{- partialCached "floating-contact.html" . }}
    {{ end }}

</body>
</html>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gpxparser/dist/GPXParser.min.js"></script>

<div class="activite-container" style="border: 1px solid #ddd; border-radius: 8px; overflow: hidden; font-family: sans-serif; margin: 20px 0;">
    <div id="map-{{ .Get 0 | safeURL }}" style="height: 350px; width: 100%;"></div>

    <div style="padding: 15px; background: #f9f9f9; display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; text-align: center;">
        <div><small>Distance</small><br><strong id="dist-{{ .Get 0 | safeURL }}">-</strong> km</div>
        <div><small>Temps</small><br><strong id="time-{{ .Get 0 | safeURL }}">-</strong></div>
        <div><small>Dénivelé (+/-)</small><br><strong><span id="elev-p-{{ .Get 0 | safeURL }}">-</span> / <span id="elev-m-{{ .Get 0 | safeURL }}">-</span></strong> m</div>
        <div><small>Vitesse (Moy/Max)</small><br><strong><span id="speed-av-{{ .Get 0 | safeURL }}">-</span> / <span id="speed-mx-{{ .Get 0 | safeURL }}">-</span></strong> km/h</div>
        <div><small>FC Moy</small><br><strong id="hr-{{ .Get 0 | safeURL }}">-</strong> bpm</div>
        <div><small>Cadence Moy</small><br><strong id="cad-{{ .Get 0 | safeURL }}">-</strong> rpm</div>
    </div>
</div>

<script>
    (function() {
        const gpxUrl = "/gpx/{{ .Get 0 }}";
        const idSuffix = "{{ .Get 0 | safeURL }}";

        fetch(gpxUrl)
            .then(response => response.text())
            .then(xmlRaw => {
                // 1. Parser pour la géométrie (Carte et Distance)
                let gpx = new gpxParser();
                gpx.parse(xmlRaw);

                if (!gpx.tracks || gpx.tracks.length === 0) return;
                let track = gpx.tracks[0];
                let pts = track.points;

                // Carte
                var map = L.map('map-' + idSuffix);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                var coordinates = pts.map(p => [p.lat, p.lon]);
                L.polyline(coordinates, {color: '#e74c3c', weight: 3}).addTo(map);
                map.fitBounds(L.polyline(coordinates).getBounds());

                // Stats de base Hugo
                document.getElementById('dist-' + idSuffix).innerText = (track.distance.total / 1000).toFixed(2);
                document.getElementById('elev-p-' + idSuffix).innerText = Math.round(track.elevation.pos || 0);
                document.getElementById('elev-m-' + idSuffix).innerText = Math.round(track.elevation.neg || 0);

                // Temps
                let startTime = new Date(pts[0].time);
                let endTime = new Date(pts[pts.length - 1].time);
                let durationSec = Math.floor((endTime - startTime) / 1000);
                document.getElementById('time-' + idSuffix).innerText = Math.floor(durationSec / 3600) + "h " + Math.floor((durationSec % 3600) / 60) + "m";

                // Vitesse Moyenne
                let avgSpeed = (track.distance.total / 1000) / (durationSec / 3600);
                document.getElementById('speed-av-' + idSuffix).innerText = avgSpeed.toFixed(1);

                // --- 2. LECTURE MANUELLE DES EXTENSIONS (REGEX SUR XML BRUT) ---

                // Extraction de toutes les valeurs de FC, Cadence et Vitesse dans le texte XML
                const hrValues = [...xmlRaw.matchAll(/<gpxtpx:hr>(\d+)<\/gpxtpx:hr>/g)].map(m => parseInt(m[1]));
                const cadValues = [...xmlRaw.matchAll(/<gpxtpx:cad>(\d+)<\/gpxtpx:cad>/g)].map(m => parseInt(m[1]));
                const speedValues = [...xmlRaw.matchAll(/<gpxtpx:speed>([\d.]+)<\/gpxtpx:speed>/g)].map(m => parseFloat(m[1]));

                // Calcul FC Moyenne
                if (hrValues.length > 0) {
                    const hrAvg = hrValues.reduce((a, b) => a + b) / hrValues.length;
                    document.getElementById('hr-' + idSuffix).innerText = Math.round(hrAvg);
                }

                // Calcul Cadence Moyenne
                if (cadValues.length > 0) {
                    const cadAvg = cadValues.reduce((a, b) => a + b) / cadValues.length;
                    document.getElementById('cad-' + idSuffix).innerText = Math.round(cadAvg);
                }

                // Calcul Vitesse Max
                if (speedValues.length > 0) {
                    const maxSpeedms = Math.max(...speedValues);
                    document.getElementById('speed-mx-' + idSuffix).innerText = (maxSpeedms * 3.6).toFixed(1);
                } else if (track.stats.maxSpeed) {
                    // Backup si gpx-parser a réussi là où la regex a échoué
                    document.getElementById('speed-mx-' + idSuffix).innerText = (track.stats.maxSpeed * 3.6).toFixed(1);
                }
            })
            .catch(err => console.error("Erreur:", err));
    })();
</script>

<button id=clear-search class=btn-clear title="Effacer la recherche" style=display:none>&#215;</button></div><hr style="border:0;border-top:1px solid var(--border-color);margin:2rem 0"><div id=search-results class=search-results-page-list></div></div><style>#search-input-page{width:100%;height:55px;padding:1rem 3rem 1rem 1rem;border:1px solid #ddd;border-radius:var(--btn-radius);font-size:1.2rem;outline:none;transition:var(--transition);background-color:#fff}#search-input-page:focus{outline:none!important;box-shadow:none!important;border-color:#ddd!important;border-left:4px solid var(--signature-violet)!important;border-bottom:4px solid var(--signature-violet)!important;padding-left:1.2rem}.search-wrapper-page{position:relative;display:flex;align-items:center;width:100%}.btn-clear{position:absolute;right:15px;top:50%;transform:translateY(-50%);background:0 0;border:none;font-size:1.8rem;color:var(--primary-gray);cursor:pointer;line-height:1;padding:0;transition:var(--transition);z-index:5}.btn-clear:hover{color:var(--signature-violet);transform:translateY(-50%)scale(1.2)}.search-results-page-list#search-results{position:static!important;display:block!important;box-shadow:none!important;border:none!important;max-height:none!important;overflow:visible!important;padding:0!important;margin-top:2rem!important;background:0 0!important}.search-result-big{margin-bottom:3rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border-color);animation:fadeIn .4s ease-out forwards}.search-result-big h3{margin-bottom:.5rem}.search-result-big .author{font-size:.85rem;color:var(--primary-gray);margin-bottom:10px}.search-result-big .excerpt{color:#444;line-height:1.7;font-size:1rem}mark{background-color:var(--signature-violet);color:#fff;padding:0 4px;border-radius:3px;font-weight:500}@keyframes fadeIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}@media(max-width:600px){#search-input-page{font-size:1rem;height:50px}}</style><script src=https://cdn.jsdelivr.net/npm/fuse.js@6.6.2></script><script src=../js/search.js></script></main><footer role=contentinfo><div class="container text-center"><div class=row><div class=col-12><p class=footer-credits>Fièrement construit avec

<a href=../mentions-legales class=footer-dark-link>Mentions légales</a></p></div></div></div></footer><script src=https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js></script><script type=module>
  import PhotoSwipeLightbox from 'https://unpkg.com/photoswipe@5/dist/photoswipe-lightbox.esm.js';
  import PhotoSwipe from 'https://unpkg.com/photoswipe@5/dist/photoswipe.esm.js';

  const lightbox = new PhotoSwipeLightbox({
    gallery: '.pswp-gallery',
    children: 'a',
    pswpModule: PhotoSwipe
  });

  lightbox.on('uiRegister', function() {
    lightbox.pswp.ui.registerElement({
      name: 'custom-caption',
      order: 1,
      isButton: false,
      appendTo: 'root',
      html: '',
      onInit: (el, pswp) => {
        el.style.position = 'absolute';
        el.style.top = '15px';
        el.style.left = '50%';
        el.style.transform = 'translateX(-50%)';
        el.style.width = 'auto';
        el.style.maxWidth = '60%';
        el.style.textAlign = 'center';
        el.style.color = '#9400D3';
        el.style.fontWeight = '700';
        el.style.fontSize = '1.1rem';
        el.style.background = 'rgba(255, 255, 255, 0.85)';
        el.style.padding = '5px 15px';
        el.style.borderRadius = '8px';
        el.style.boxShadow = '0 2px 8px rgba(0,0,0,0.2)';
        el.style.pointerEvents = 'none';
        el.style.zIndex = '1000';

        pswp.on('change', () => {
            const currSlide = pswp.currSlide;
            const caption = currSlide.data.element.dataset.caption || '';
            el.innerHTML = caption;
            el.style.display = caption ? 'block' : 'none';
        });
      }
    });
  });
  lightbox.init();
</script></body></html>
